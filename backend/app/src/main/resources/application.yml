spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ledgerx?serverTimezone=Asia/Tokyo&characterEncoding=utf8
    username: ledgerx
    password: ledgerx_123
  jpa:
    hibernate:
      ddl-auto: none     # 你已经手写了建表 SQL，就不要自动建表了
    properties:
      hibernate:
        format_sql: true
    show-sql: true
ledgerx:
  auth:
    signup-token-ttl: 15m
    basic-auth-client:
      enabled: false
      client-id: ${LEDGERX_API_CLIENT_ID:}
      client-secret: ${LEDGERX_API_CLIENT_SECRET:}
  webauthn:
    enabled: true
    rpName: "LedgerX"
    rpId: "localhost"
    origins:
      - "http://localhost:3000"
    challengeTtlSeconds: 300
